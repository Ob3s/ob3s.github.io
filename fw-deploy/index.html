<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Deploy">
<meta name="theme-color" content="#cc2200">
<meta name="app-version" content="2.5">
<link rel="manifest" href="manifest.json">
<title>Ortswehr Deploy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red:    #cc2200;
    --bg:     #0f1117;
    --panel:  #1a1d26;
    --panel2: #20242f;
    --border: #2e3244;
    --text:   #e2e8f0;
    --muted:  #64748b;
    --green:  #22c55e;
    --yellow: #f59e0b;
    --blue:   #3b82f6;
    --orange: #f97316;
    --mono:   'JetBrains Mono', monospace;
    --sans:   'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--sans); -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .shell { display: flex; flex-direction: column; height: 100%; }

  header {
    background: var(--red);
    padding: env(safe-area-inset-top, 0px) 1rem 0;
    height: calc(52px + env(safe-area-inset-top, 0px));
    display: flex; align-items: flex-end; padding-bottom: 0.7rem;
    gap: 0.75rem; flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  header .logo { font-size: 1.3rem; }
  header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
  header .version { font-family: var(--mono); font-size: 0.7rem; opacity: 0.7; }

  main { flex: 1; overflow-y: auto; padding: 1rem; -webkit-overflow-scrolling: touch; }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.1rem; margin-bottom: 0.9rem;
  }
  .card h2 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.4rem; }
  .card-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.75rem; line-height: 1.5; }

  .env-toggle {
    display: flex; gap: 0; border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border); margin-bottom: 0.9rem;
  }
  .env-btn {
    flex: 1; padding: 0.7rem; border: none; cursor: pointer;
    font-family: var(--sans); font-size: 0.9rem; font-weight: 600;
    transition: background 0.15s, color 0.15s;
    background: var(--panel2); color: var(--muted);
  }
  .env-btn.aktiv-dev  { background: var(--orange); color: #fff; }
  .env-btn.aktiv-prod { background: var(--green);  color: #000; }

  #env-banner {
    border-radius: 10px; padding: 0.6rem 0.9rem; margin-bottom: 0.9rem;
    font-size: 0.82rem; font-weight: 600; text-align: center;
    display: none;
  }
  #env-banner.dev  { background: rgba(249,115,22,0.15); color: var(--orange); border: 1px solid rgba(249,115,22,0.3); }
  #env-banner.prod { background: rgba(34,197,94,0.12);  color: var(--green);  border: 1px solid rgba(34,197,94,0.3); }

  .dropzone {
    border: 2px dashed var(--border); border-radius: 10px;
    padding: 2rem 1rem; text-align: center; cursor: pointer;
    transition: all 0.2s; margin-bottom: 0.75rem;
    background: var(--panel2);
  }
  .dropzone.drag  { border-color: var(--red);   background: rgba(204,34,0,0.08); }
  .dropzone.ready { border-color: var(--green); background: rgba(34,197,94,0.06); }
  .dropzone-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .dropzone-text { font-size: 0.85rem; color: var(--muted); }
  .dropzone-file { font-size: 0.85rem; color: var(--green); font-family: var(--mono); margin-top: 0.3rem; }
  #file-input { display: none; }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    width: 100%; padding: 0.8rem; border-radius: 10px; border: none;
    cursor: pointer; font-family: var(--sans); font-size: 0.95rem; font-weight: 600;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    margin-top: 0.6rem;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-red    { background: var(--red);    color: #fff; }
  .btn-orange { background: var(--orange); color: #fff; }
  .btn-green  { background: var(--green);  color: #000; }
  .btn-ghost  { background: var(--panel2); color: var(--text); border: 1px solid var(--border); }

  .progress-wrap { margin: 0.75rem 0; display: none; }
  .progress-bar  { background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--red); border-radius: 4px; transition: width 0.25s; }
  .progress-text { font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; font-family: var(--mono); }

  .log-wrap { background: var(--panel2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-top: 0.75rem; }
  .log-header { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.7rem; font-weight: 600; color: var(--muted); display: flex; align-items: center; justify-content: space-between; }
  .log-body   { padding: 0.5rem; max-height: 220px; overflow-y: auto; font-family: var(--mono); font-size: 0.7rem; }
  .log-entry  { padding: 0.15rem 0.25rem; border-radius: 3px; line-height: 1.6; }
  .log-entry.ok    { color: var(--green); }
  .log-entry.warn  { color: var(--yellow); }
  .log-entry.error { color: #f87171; }
  .log-entry.info  { color: #94a3b8; }
  .log-entry.head  { color: var(--blue); font-weight: 600; margin-top: 0.25rem; }
  .log-clear { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.7rem; }

  label { display: block; font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
  input {
    width: 100%; background: var(--panel2); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.6rem 0.8rem; color: var(--text);
    font-family: var(--mono); font-size: 0.82rem; margin-bottom: 0.75rem;
  }
  input:focus { outline: none; border-color: var(--red); }

  .chip-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .chip { padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.68rem; font-weight: 600; }
  .chip-green  { background: #14532d; color: var(--green); }
  .chip-gray   { background: var(--panel2); color: var(--muted); border: 1px solid var(--border); }

  .result-ok {
    background: #14532d; border: 1px solid #166534; border-radius: 10px;
    padding: 1rem; text-align: center; margin-top: 0.75rem;
    font-size: 0.9rem; color: var(--green); display: none;
  }
  .result-ok .big { font-size: 2rem; margin-bottom: 0.3rem; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  #update-banner {
    background: #1e3a5f; border-bottom: 1px solid var(--blue);
    padding: 0.6rem 1rem; display: none; align-items: center; gap: 0.75rem; font-size: 0.82rem;
  }
  #update-banner.show { display: flex; }
  #update-btn {
    margin-left: auto; background: var(--blue); color: #fff;
    border: none; border-radius: 6px; padding: 0.35rem 0.8rem;
    font-size: 0.78rem; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
</style>
</head>
<body>
<div class="shell">

  <header>
    <span class="logo">🚒</span>
    <h1>Ortswehr Deploy</h1>
    <span class="version" id="hdr-version" style="opacity:0.6"></span>
    <script>document.getElementById('hdr-version').textContent='v'+(document.querySelector('meta[name="app-version"]')?.content||'')</script>
    <span class="version" id="hdr-status">bereit</span>
  </header>

  <div id="update-banner">
    <span>🔄 Neue Version verfügbar</span>
    <button id="update-btn" onclick="installUpdate()">Jetzt aktualisieren</button>
  </div>

  <main>

    <div class="env-toggle">
      <button class="env-btn aktiv-dev" id="btn-dev"  onclick="setEnv('dev')">🧪 DEV</button>
      <button class="env-btn"           id="btn-prod" onclick="setEnv('prod')">🚀 PROD</button>
    </div>
    <div id="env-banner" class="dev">🧪 DEV – Änderungen gehen nur an die Test-Umgebung</div>

    <div class="card" id="settings-card">
      <h2>⚙️ Einstellungen</h2>
      <label>GitHub Token</label>
      <input type="password" id="gh-token" placeholder="ghp_..." autocomplete="off">
      <div style="display:flex;gap:0.5rem">
        <div style="flex:1"><label>User</label><input id="gh-user" value="Ob3s"></div>
        <div style="flex:1"><label>Repo PROD</label><input id="gh-repo1" value="ortswehr"></div>
      </div>
      <label>Repo DEV</label>
      <input id="gh-repo1-dev" value="ortswehr-dev" placeholder="ortswehr-dev">
      <label>Root-Repo (firebase-messaging-sw.js)</label>
      <input id="gh-repo2" value="ob3s.github.io">
      <button class="btn btn-ghost" onclick="speichereSettings()" style="margin-top:0">💾 Speichern</button>
    </div>

    <div class="card">
      <h2>📦 Update deployen</h2>
      <div class="card-sub">JSON-Datei aus dem Chat hier reinwerfen oder antippen.</div>

      <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
        <div class="dropzone-icon">📂</div>
        <div class="dropzone-text">Update antippen oder reinziehen</div>
        <div class="dropzone-file" id="file-name"></div>
      </div>
      <input type="file" id="file-input" accept=".zip,.json">

      <div class="chip-row" id="file-chips"></div>

      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="progress-text" id="prog-text">Vorbereitung...</div>
      </div>

      <button class="btn btn-orange" id="btn-deploy" onclick="startDeploy()" disabled>
        🚀 Deployen
      </button>

      <div class="result-ok" id="result-ok">
        <div class="big">✅</div>
        <strong>Erfolgreich deployed!</strong><br>
        <span id="result-detail" style="font-size:0.78rem;opacity:0.8"></span>
      </div>

      <div id="changelog-box" style="display:none;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-top:0.75rem"></div>
    </div>

    <div class="log-wrap">
      <div class="log-header">
        ⬛ Protokoll
        <button class="log-clear" onclick="clearLog()">löschen</button>
      </div>
      <div class="log-body" id="log-body"></div>
    </div>

  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>

// ── Environment ──────────────────────────────────────────
let _env = localStorage.getItem('deploy_env') || 'dev';

function setEnv(env) {
  _env = env;
  localStorage.setItem('deploy_env', env);
  document.getElementById('btn-dev').className  = 'env-btn' + (env === 'dev'  ? ' aktiv-dev'  : '');
  document.getElementById('btn-prod').className = 'env-btn' + (env === 'prod' ? ' aktiv-prod' : '');
  const banner = document.getElementById('env-banner');
  const deployBtn = document.getElementById('btn-deploy');
  if (env === 'dev') {
    banner.className = 'dev';
    banner.textContent = '🧪 DEV – Änderungen gehen nur an die Test-Umgebung';
    banner.style.display = 'block';
    deployBtn.className = 'btn btn-orange';
  } else {
    banner.className = 'prod';
    banner.textContent = '🚀 PROD – Änderungen gehen an alle Kameraden!';
    banner.style.display = 'block';
    deployBtn.className = 'btn btn-green';
  }
  document.getElementById('hdr-status').textContent = env.toUpperCase();
  log('Umgebung: ' + env.toUpperCase(), env === 'prod' ? 'warn' : 'info');
}

// ── Settings ─────────────────────────────────────────────
function ladeSettings() {
  document.getElementById('gh-token').value    = localStorage.getItem('gh_token')    || '';
  document.getElementById('gh-user').value     = localStorage.getItem('gh_user')     || 'Ob3s';
  document.getElementById('gh-repo1').value    = localStorage.getItem('gh_repo1')    || 'ortswehr';
  document.getElementById('gh-repo1-dev').value= localStorage.getItem('gh_repo1_dev')|| 'ortswehr-dev';
  document.getElementById('gh-repo2').value    = localStorage.getItem('gh_repo2')    || 'ob3s.github.io';
  if (localStorage.getItem('gh_token')) {
    document.getElementById('settings-card').style.display = 'none';
    log('Token geladen ✅', 'ok');
  }
  setEnv(_env);
}

function speichereSettings() {
  localStorage.setItem('gh_token',     document.getElementById('gh-token').value.trim());
  localStorage.setItem('gh_user',      document.getElementById('gh-user').value.trim());
  localStorage.setItem('gh_repo1',     document.getElementById('gh-repo1').value.trim());
  localStorage.setItem('gh_repo1_dev', document.getElementById('gh-repo1-dev').value.trim());
  localStorage.setItem('gh_repo2',     document.getElementById('gh-repo2').value.trim());
  document.getElementById('settings-card').style.display = 'none';
  log('Einstellungen gespeichert ✅', 'ok');
}

// ── Log ──────────────────────────────────────────────────
function log(msg, type='info') {
  const el = document.getElementById('log-body');
  const d  = document.createElement('div');
  d.className = 'log-entry ' + type;
  const ts = new Date().toLocaleTimeString('de-DE');
  d.textContent = '[' + ts + '] ' + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('log-body').innerHTML = ''; }

// ── Datei-Mapping ─────────────────────────────────────────
const REPO_MAP = {
  'index.html':               { repo: 'repo1', path: 'index.html' },
  'version.json':             { repo: 'repo1', path: 'version.json' },
  'changes.json':             { repo: 'repo1', path: 'changes.json' },
  'sw.js':                    { repo: 'repo1', path: 'sw.js' },
  'js/pages.js':              { repo: 'repo1', path: 'js/pages.js' },
  'css/style.css':            { repo: 'repo1', path: 'css/style.css' },
  'manifest.json':            { repo: 'repo1', path: 'manifest.json' },
  'firebase-messaging-sw.js': { repo: 'repo2', path: 'firebase-messaging-sw.js' },
};

let _files = {};
let _detectedVersion = '';
let _detectedChanges = null;

// ── Changelog ────────────────────────────────────────────
function zeigeChangelog(version, punkte) {
  const el = document.getElementById('changelog-box');
  if (!el || !punkte?.length) return;
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem">
      <span style="font-family:var(--mono);font-size:0.8rem;background:#1e3a5f;color:var(--blue);padding:0.2rem 0.6rem;border-radius:20px">v${version}</span>
      <span style="font-size:0.68rem;background:#14532d;color:var(--green);padding:0.1rem 0.4rem;border-radius:10px">bereit</span>
    </div>
    <ul style="list-style:none;padding:0">
      ${punkte.map(p => `<li style="font-size:0.8rem;padding:0.25rem 0;border-bottom:1px solid var(--border);display:flex;gap:0.5rem"><span style="color:var(--green);flex-shrink:0">▸</span>${p}</li>`).join('')}
    </ul>`;
  el.style.display = 'block';
}

// ── Version in index.html automatisch patchen ─────────────
// Wird vor dem Deploy aufgerufen – ersetzt den app-version Meta-Tag
// mit der Version aus dem Bundle. Kein manuelles Anpassen mehr nötig.
function patchIndexVersion(b64Content, version) {
  try {
    let html = new TextDecoder().decode(Uint8Array.from(atob(b64Content), c => c.charCodeAt(0)));
    const patched = html.replace(
      /(<meta\s+name="app-version"\s+content=")[^"]*(")/,
      `$1${version}$2`
    );
    if (patched === html) {
      log('⚠️ app-version Meta-Tag nicht gefunden in index.html', 'warn');
    } else {
      log(`✅ index.html: app-version → ${version}`, 'ok');
    }
    return btoa(unescape(encodeURIComponent(patched)));
  } catch(e) {
    log('⚠️ index.html patchen fehlgeschlagen: ' + e.message, 'warn');
    return b64Content; // Original zurückgeben, nicht abbrechen
  }
}

// ── Drag & Drop ──────────────────────────────────────────
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); if (e.dataTransfer.files[0]) verarbeiteZip(e.dataTransfer.files[0]); });
document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) verarbeiteZip(e.target.files[0]); });

async function verarbeiteZip(file) {
  _detectedVersion = ''; _detectedChanges = null;
  document.getElementById('changelog-box').style.display = 'none';
  document.getElementById('file-name').textContent = file.name;
  dz.classList.add('ready');
  log('Geladen: ' + file.name, 'info');

  try {
    if (file.size === 0) throw new Error('Datei ist leer');

    const isJson = file.name.endsWith('.json') || file.type === 'application/json' || file.type === '';
    if (isJson) {
      let text = null;
      const istNull = t => !t || t.charCodeAt(0) === 0;

      try { const t = await new Response(file).text(); if (!istNull(t)) text = t; } catch(e) {}
      if (istNull(text) && typeof file.text === 'function') { try { const t = await file.text(); if (!istNull(t)) text = t; } catch(e) {} }
      if (istNull(text)) {
        try {
          const dataUrl = await new Promise((res, rej) => { const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsDataURL(file); });
          text = decodeURIComponent(escape(atob(dataUrl.split(',')[1])));
        } catch(e) {}
      }
      if (istNull(text)) { try { text = await new Promise((res, rej) => { const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsText(file, 'utf-8'); }); } catch(e) {} }
      if (istNull(text)) throw new Error('Datei konnte nicht gelesen werden');

      try {
        const bundle = JSON.parse(text);
        if (bundle.files) { log('JSON-Bundle erkannt ✅', 'ok'); verarbeiteBundle(bundle); return; }
      } catch(e) { throw new Error('JSON ungültig: ' + e.message); }
    }

    // ZIP-Fallback
    const rawBuffer = await new Promise((res, rej) => { const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsArrayBuffer(file); });
    const magic = new Uint8Array(rawBuffer.slice(0,4));
    if (!(magic[0]===0x50 && magic[1]===0x4B)) throw new Error('Datei ist weder JSON noch ZIP');
    const zip = await JSZip.loadAsync(rawBuffer);
    _files = {};
    const chips = [];
    for (const [zipPath, zipFile] of Object.entries(zip.files)) {
      if (zipFile.dir) continue;
      const parts = zipPath.split('/');
      const normiert = parts.length >= 2 ? parts.slice(1).join('/') : parts[0];
      if (!normiert) continue;
      const mapping = REPO_MAP[normiert];
      if (!mapping) { log('Übersprungen: ' + normiert, 'warn'); continue; }
      const content = await zipFile.async('base64');
      _files[normiert] = { ...mapping, content };
      chips.push('<span class="chip chip-green">✅ ' + normiert + '</span>');
      log('Erkannt: ' + normiert, 'ok');
      if (normiert === 'version.json') { try { const v = JSON.parse(atob(content)).version||''; if(v){_detectedVersion=v; zeigeChangelog(v,_detectedChanges);} } catch(e){} }
      if (normiert === 'changes.json') { try { _detectedChanges = JSON.parse(atob(content)).punkte||[]; if(_detectedVersion) zeigeChangelog(_detectedVersion,_detectedChanges); } catch(e){} }
    }
    document.getElementById('file-chips').innerHTML = chips.join('');
    const n = Object.keys(_files).length;
    if (n > 0) { document.getElementById('btn-deploy').disabled = false; document.getElementById('btn-deploy').textContent = '🚀 ' + n + ' Datei' + (n!==1?'en':'') + ' deployen'; }
    else log('Keine bekannten Dateien erkannt!', 'error');
  } catch(e) {
    log('Fehler: ' + e.message, 'error');
    dz.classList.remove('ready');
    document.getElementById('file-name').textContent = '';
    document.getElementById('file-input').value = '';
    document.getElementById('btn-deploy').disabled = true;
  }
}

function verarbeiteBundle(bundle) {
  const version = bundle.version || '';
  if (version) { _detectedVersion = version; zeigeChangelog(version, bundle.punkte); }
  _files = {};
  for (const [name, b64] of Object.entries(bundle.files || {})) {
    const normiert = REPO_MAP[name] ? name : name.replace(/^[^/]+\//, '');
    const mapping = REPO_MAP[normiert];
    if (mapping) {
      _files[normiert] = { ...mapping, content: b64 };
      log('Erkannt: ' + normiert + ' → ' + (mapping.repo==='repo1'?'ortswehr':'ob3s.github.io'), 'ok');
      if (normiert === 'changes.json') { try { _detectedChanges = JSON.parse(atob(b64)).punkte||[]; zeigeChangelog(_detectedVersion, _detectedChanges); } catch(e){} }
      if (normiert === 'version.json') { try { const v = JSON.parse(atob(b64)).version||''; if(v){_detectedVersion=v; zeigeChangelog(v,_detectedChanges);} } catch(e){} }
    }
  }
  const n = Object.keys(_files).length;
  log(n + ' Datei' + (n!==1?'en':'') + ' bereit', n>0?'ok':'warn');
  if (n > 0) document.getElementById('btn-deploy').disabled = false;
  dz.classList.add('ready');
}

// ── GitHub API ────────────────────────────────────────────
async function ghRequest(method, url, body) {
  const token = localStorage.getItem('gh_token');
  const res = await fetch(url, {
    method,
    headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok && res.status !== 404) { const err = await res.text(); throw new Error(res.status + ' ' + err.slice(0,200)); }
  return res.status === 404 ? null : await res.json();
}

async function pushDatei(repo, path, base64Content, commitMsg) {
  const user = localStorage.getItem('gh_user') || 'Ob3s';
  const url  = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;
  const existing = await ghRequest('GET', url);
  const sha = existing?.sha;
  await ghRequest('PUT', url, { message: commitMsg, content: base64Content, ...(sha ? { sha } : {}) });
}

// ── Deploy ────────────────────────────────────────────────
async function startDeploy() {
  const token = localStorage.getItem('gh_token');
  if (!token) { log('Kein Token!', 'error'); return; }

  const dateien = Object.entries(_files);
  if (!dateien.length) { log('Keine Dateien', 'error'); return; }

  if (_env === 'prod') {
    if (!confirm('⚠️ PROD-Deploy!\n\nDieser Build geht an alle Kameraden.\nWirklich deployen?')) return;
  }

  const user  = localStorage.getItem('gh_user') || 'Ob3s';
  const repo1 = _env === 'dev'
    ? (localStorage.getItem('gh_repo1_dev') || 'ortswehr-dev')
    : (localStorage.getItem('gh_repo1')     || 'ortswehr');
  const repo2 = localStorage.getItem('gh_repo2') || 'ob3s.github.io';

  log(`Deploy → ${_env.toUpperCase()} (${repo1})`, _env === 'prod' ? 'warn' : 'head');

  document.getElementById('btn-deploy').disabled = true;
  document.getElementById('result-ok').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('hdr-status').textContent = 'deploye...';

  // Version aus Bundle lesen
  let version = _detectedVersion;
  if (!version && _files['version.json']) {
    try { version = JSON.parse(atob(_files['version.json'].content)).version || ''; } catch(e) {}
  }

  // ── NEU: index.html automatisch patchen ──────────────────
  // Die Version wird direkt in den Meta-Tag geschrieben, sodass
  // die Update-Prüfung nach dem Deploy sofort greift.
  if (version && _files['index.html']) {
    _files['index.html'].content = patchIndexVersion(_files['index.html'].content, version);
  }
  // ─────────────────────────────────────────────────────────

  let commitMsg = version ? `v${version} [${_env}]` : `Update ${new Date().toLocaleDateString('de-DE')} [${_env}]`;
  if (_files['changes.json']) {
    try {
      const ch = JSON.parse(atob(_files['changes.json'].content));
      const punkte = (ch.punkte || []).map(p => '- ' + p).join('\n');
      commitMsg = `v${version} [${_env}]\n\n${punkte}`;
    } catch(e) {}
  }

  let ok = 0, fehler = 0;
  for (let i = 0; i < dateien.length; i++) {
    const [normiert, info] = dateien[i];
    const repo = info.repo === 'repo1' ? repo1 : repo2;
    document.getElementById('prog-fill').style.width = Math.round((i / dateien.length) * 100) + '%';
    document.getElementById('prog-text').textContent = `${i+1}/${dateien.length}: ${normiert}`;
    log(`Pushe ${normiert} → ${repo}`, 'info');
    try { await pushDatei(repo, info.path, info.content, commitMsg); log(`✅ ${normiert}`, 'ok'); ok++; }
    catch(e) { log(`❌ ${normiert}: ${e.message}`, 'error'); fehler++; }
  }

  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-text').textContent = 'Fertig!';
  document.getElementById('hdr-status').textContent = ok + '/' + dateien.length + ' ✅';

  if (ok > 0) {
    document.getElementById('result-ok').style.display = 'block';
    document.getElementById('result-detail').textContent =
      `${ok} Datei${ok!==1?'en':''} gepusht${fehler ? ` · ${fehler} Fehler` : ''} · v${version} · ${_env.toUpperCase()}`;
  }
  document.getElementById('btn-deploy').disabled = false;
}

// ── Service Worker ────────────────────────────────────────
let _newSW = null;
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      _newSW = reg.installing;
      _newSW.addEventListener('statechange', () => {
        if (_newSW.state === 'installed' && navigator.serviceWorker.controller) {
          document.getElementById('update-banner').classList.add('show');
        }
      });
    });
    reg.update();
  }).catch(() => {});
  navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
}
window.installUpdate = () => { if (_newSW) _newSW.postMessage('skipWaiting'); else window.location.reload(); };

ladeSettings();

// ── Update-Prüfung ───────────────────────────────────────
window.pruefeAufUpdate = async () => {
  try {
    const res = await fetch('./version.json?t=' + Date.now(), { cache: 'no-store' });
    const { version } = await res.json();
    const lokal = document.querySelector('meta[name="app-version"]')?.content;
    if (lokal && version && version !== lokal) {
      const banner = document.getElementById('update-banner');
      if (banner) banner.classList.add('show');
      document.getElementById('update-btn').onclick = async () => {
        document.getElementById('update-btn').textContent = '⏳ Wird aktualisiert...';
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        } catch(e) {}
        window.location.reload(true);
      };
    }
  } catch(e) {}
};
setTimeout(pruefeAufUpdate, 1500);
</script>
